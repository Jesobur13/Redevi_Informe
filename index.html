<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador Informe REDEVI — CZ8</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root {
    --bg: #f0f0ec;
    --surface: #ffffff;
    --border: #d0cfc8;
    --accent: #1a3a5c;
    --accent2: #365f91;
    --muted: #7a7a72;
    --danger: #c0392b;
    --text: #1a1a18;
    --label: #4a4a44;
    --input-bg: #fafaf7;
    --tag-bg: #e8e8e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .shell {
    max-width: 760px;
    margin: 0 auto;
  }
  header {
    margin-bottom: 36px;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
  }
  h1 span {
    display: block;
    font-weight: 300;
    font-size: 18px;
    color: var(--muted);
    margin-top: 4px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .row.single { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--label);
  }
  input, select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent2); }
  select { cursor: pointer; }
  .personas-container { display: flex; flex-direction: column; gap: 12px; }
  .persona-card {
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px;
    background: var(--input-bg);
    position: relative;
  }
  .persona-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }
  .tag-noregistra {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 2px;
    background: var(--tag-bg);
    color: var(--muted);
    margin-top: 10px;
  }
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    align-items: center;
  }
  .btn-primary {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 12px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { background: #0f2540; }
  .btn-secondary {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 12px 20px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent); }
  .status {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }
  .status.ok { color: #2e7d32; }
  footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 28px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <p class="eyebrow">Ministerio de Educación &mdash; CZ8</p>
    <h1>Informe REDEVI<span>Dirección Zonal de Educación Especializada e Inclusiva</span></h1>
  </header>

  <div class="card">
    <p class="card-title">Datos del Informe</p>
    <div class="row">
      <div class="field">
        <label for="fecha">Fecha del Informe</label>
        <input type="text" id="fecha" placeholder="ej: 16/03/2026">
      </div>
      <div class="field">
        <label for="numero">Número de Informe</label>
        <input type="text" id="numero" placeholder="ej: Z8-DZEEI-2026-001" style="font-size:12px;">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Personas a Validar</p>
    <div class="row" style="margin-bottom:20px;">
      <div class="field">
        <label for="numPersonas">Número de personas</label>
        <select id="numPersonas" onchange="generarCampos()">
          <option value="">Seleccionar...</option>
          <option value="1">1 persona</option>
          <option value="2">2 personas</option>
          <option value="3">3 personas</option>
          <option value="4">4 personas</option>
          <option value="5">5 personas</option>
          <option value="6">6 personas</option>
          <option value="7">7 personas</option>
          <option value="8">8 personas</option>
          <option value="9">9 personas</option>
          <option value="10">10 personas</option>
          <option value="11">11 personas</option>
          <option value="12">12 personas</option>
          <option value="13">13 personas</option>
          <option value="14">14 personas</option>
          <option value="15">15 personas</option>
          <option value="16">16 personas</option>
          <option value="17">17 personas</option>
          <option value="18">18 personas</option>
          <option value="19">19 personas</option>
          <option value="20">20 personas</option>
        </select>
      </div>
    </div>
    <div class="personas-container" id="personasContainer"></div>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="generarPDF()">⬇ Generar PDF</button>
    <button class="btn-secondary" onclick="limpiar()">Limpiar</button>
    <span class="status" id="status"></span>
  </div>

  <footer>Zona 8 &mdash; DZEEI &mdash; Sistema de Generación de Informes REDEVI</footer>
</div>

function generarCampos() {
  const n = parseInt(document.getElementById('numPersonas').value) || 0;
  const c = document.getElementById('personasContainer');
  c.innerHTML = '';
  for (let i = 1; i <= n; i++) {
    c.innerHTML += `
      <div class="persona-card">
        <p class="persona-num">Persona ${i} de ${n}</p>
        <div class="row">
          <div class="field">
            <label>Cédula</label>
            <input type="text" id="cedula_${i}" placeholder="0921688560" maxlength="13">
          </div>
          <div class="field">
            <label>Apellidos</label>
            <input type="text" id="apellidos_${i}" placeholder="TACURI GAMBOA">
          </div>
        </div>
        <div class="row single">
          <div class="field">
            <label>Nombres</label>
            <input type="text" id="nombres_${i}" placeholder="VANESSA GABRIELA">
          </div>
        </div>
        <span class="tag-noregistra">✓ Validación REDEVI: NO REGISTRA</span>
      </div>`;
  }
}

function limpiar() {
  document.getElementById('fecha').value = '';
  document.getElementById('numero').value = '';
  document.getElementById('numPersonas').value = '';
  document.getElementById('personasContainer').innerHTML = '';
  document.getElementById('status').textContent = '';
  document.getElementById('status').className = 'status';
}

function wrapText(doc, text, x, y, maxWidth, lineHeight, fontSize) {
  doc.setFontSize(fontSize);
  const lines = doc.splitTextToSize(text, maxWidth);
  lines.forEach((line, i) => doc.text(line, x, y + i * lineHeight));
  return lines.length * lineHeight;
}

function generarPDF() {
  const fecha   = document.getElementById('fecha').value.trim();
  const numero  = document.getElementById('numero').value.trim();
  const nP      = parseInt(document.getElementById('numPersonas').value) || 0;

  if (!fecha || !numero || nP === 0) {
    document.getElementById('status').textContent = '⚠ Completa todos los campos.';
    document.getElementById('status').className = 'status';
    return;
  }

  const personas = [];
  for (let i = 1; i <= nP; i++) {
    personas.push({
      cedula:    document.getElementById(`cedula_${i}`)?.value.trim()    || '',
      apellidos: document.getElementById(`apellidos_${i}`)?.value.trim().toUpperCase() || '',
      nombres:   document.getElementById(`nombres_${i}`)?.value.trim().toUpperCase()   || '',
    });
  }

  document.getElementById('status').textContent = 'Generando...';

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const PW = 210, PH = 297;
  const ML = 18, MR = 18, MT = 38, MB = 35;
  const CW = PW - ML - MR;  // ~174mm

  // ── Membrete de fondo ──────────────────────────────
  doc.addImage('data:image/png;base64,' + MEMBRETE_B64, 'PNG', 0, 0, PW, PH);

  let Y = MT;

  // Colores
  const GRIS_OSC = [188, 188, 188];
  const GRIS_CL  = [217, 217, 217];
  const AZUL_TXT = [54, 95, 145];
  const NEGRO    = [0, 0, 0];
  const BLANCO   = [255, 255, 255];

  // ── TABLA DATOS GENERALES ────────────────────────────
  // Estructura: 5 columnas
  const cw = [32, 32, 28, 45, 37]; // suma 174mm  c2=Ext.Tel c3=Correo c4=Cargo
  const ROW_H = 7;
  const PAD = 2;

  function drawCell(x, y, w, h, fillColor, textLines, textColor, bold, fontSize) {
    doc.setFillColor(...fillColor);
    doc.rect(x, y, w, h, 'F');
    doc.setDrawColor(150);
    doc.setLineWidth(0.2);
    doc.rect(x, y, w, h, 'S');
    if (textLines && textLines.length) {
      doc.setTextColor(...textColor);
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.setFontSize(fontSize || 7);
      textLines.forEach((line, i) => {
        doc.text(line, x + PAD, y + 4 + i * 3.5);
      });
    }
  }

  function splitCell(text, maxWidth, fontSize) {
    doc.setFontSize(fontSize || 7);
    return doc.splitTextToSize(text, maxWidth - PAD * 2);
  }

  // Calcular alturas de filas según contenido
  const rowH = [5, 6, 6, 6, 8, 6, 6, 8];

  // F0: DATOS GENERALES
  let x0 = ML, y0 = Y;
  doc.setFillColor(...GRIS_OSC);
  doc.rect(x0, y0, CW, rowH[0], 'F');
  doc.setDrawColor(150); doc.setLineWidth(0.2);
  doc.rect(x0, y0, CW, rowH[0], 'S');
  doc.setTextColor(0); doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('DATOS GENERALES', ML + CW/2, y0 + 5, { align: 'center' });

  // F1: Fecha / Número
  let y1 = y0 + rowH[0];
  // Col 0: Fecha de Informe
  drawCell(ML, y1, cw[0], rowH[1], GRIS_CL, ['Fecha de Informe'], AZUL_TXT, true, 9);
  // Col 1: valor fecha
  drawCell(ML+cw[0], y1, cw[1], rowH[1], BLANCO, [fecha], NEGRO, false, 9);
  // Col 2: No. de Informe
  drawCell(ML+cw[0]+cw[1], y1, cw[2], rowH[1], GRIS_CL, ['N. De','Informe'], AZUL_TXT, true, 8);
  // Col 3+4: valor número (span)
  drawCell(ML+cw[0]+cw[1]+cw[2], y1, cw[3]+cw[4], rowH[1], BLANCO, [numero], NEGRO, false, 9);

  // F2: headers funcionario
  let y2 = y1 + rowH[1];
  drawCell(ML, y2, cw[0], rowH[2]+rowH[3]+rowH[4], GRIS_CL, ['Funcionario','Responsable','de Informe'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0], y2, cw[1], rowH[2]+rowH[3], GRIS_CL, ['Nombre'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0]+cw[1], y2, cw[2]+cw[3], rowH[2], GRIS_CL, ['Contacto'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0]+cw[1]+cw[2]+cw[3], y2, cw[4], rowH[2], GRIS_CL, ['Cargo'], AZUL_TXT, true, 9);

  // F3: sub-headers + cargo value
  let y3 = y2 + rowH[2];
  drawCell(ML+cw[0]+cw[1], y3, cw[2], rowH[3], GRIS_CL, ['Teléfono'], AZUL_TXT, true, 8);
  drawCell(ML+cw[0]+cw[1]+cw[2], y3, cw[3], rowH[3], GRIS_CL, ['Correo Electrónico'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0]+cw[1]+cw[2]+cw[3], y3, cw[4], rowH[3]+rowH[4], BLANCO, ['Analista Zonal DECE - CZ8'], NEGRO, false, 9);

  // F4: datos funcionario
  let y4 = y3 + rowH[3];
  drawCell(ML+cw[0], y4, cw[1], rowH[4], BLANCO, ['Jefferson Steeven','Solis Burgos'], NEGRO, false, 9);
  drawCell(ML+cw[0]+cw[1], y4, cw[2], rowH[4], BLANCO, ['0983875413'], NEGRO, false, 9);
  drawCell(ML+cw[0]+cw[1]+cw[2], y4, cw[3], rowH[4], BLANCO, ['jefferson.solis@educacion.gob.ec'], NEGRO, false, 8);

  // F5: headers destinatario
  let y5 = y2 + rowH[2] + rowH[3] + rowH[4];
  drawCell(ML, y5, cw[0], rowH[5]+rowH[6]+rowH[7], GRIS_CL, ['Informe','dirigido a:'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0], y5, cw[1], rowH[5]+rowH[6], GRIS_CL, ['Nombre'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0]+cw[1], y5, cw[2]+cw[3], rowH[5], GRIS_CL, ['Contacto'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0]+cw[1]+cw[2]+cw[3], y5, cw[4], rowH[5], GRIS_CL, ['Cargo'], AZUL_TXT, true, 9);

  // F6: sub-headers + cargo value destinatario
  let y6 = y5 + rowH[5];
  drawCell(ML+cw[0]+cw[1], y6, cw[2], rowH[6], GRIS_CL, ['Teléfono'], AZUL_TXT, true, 8);
  drawCell(ML+cw[0]+cw[1]+cw[2], y6, cw[3], rowH[6], GRIS_CL, ['Correo Electrónico'], AZUL_TXT, true, 9);
  drawCell(ML+cw[0]+cw[1]+cw[2]+cw[3], y6, cw[4], rowH[6]+rowH[7], BLANCO, ['Directora Zonal de Educ. Especializada e Inclusiva'], NEGRO, false, 6.5);

  // F7: datos destinataria
  let y7 = y6 + rowH[6];
  drawCell(ML+cw[0], y7, cw[1], rowH[7], BLANCO, ['María de Lourdes','Bermúdez Morán'], NEGRO, false, 9);
  drawCell(ML+cw[0]+cw[1], y7, cw[2], rowH[7], BLANCO, ['-'], NEGRO, false, 9);
  drawCell(ML+cw[0]+cw[1]+cw[2], y7, cw[3], rowH[7], BLANCO, ['marial.bermudez@','educacion.gob.ec'], NEGRO, false, 8);

  Y = y7 + rowH[7] + 5;

  // ── SECCIONES DE TEXTO ──────────────────────────────
  function seccion(titulo) {
    Y += 4;  // espacio antes del título
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(0);
    doc.text(titulo, ML, Y); Y += 6;
  }
  function cuerpo(texto) {
    doc.setFont('helvetica','normal'); doc.setFontSize(12); doc.setTextColor(30,30,30);
    const maxW = CW - 8;
    const lineH = 7.5;
    const lines = doc.splitTextToSize(texto, maxW);
    for (let i = 0; i < lines.length; i++) {
      const isLast = i === lines.length - 1;
      if (!isLast) {
        // Justificar: calcular espacio extra entre palabras
        const words = lines[i].split(' ');
        if (words.length > 1) {
          const lineWidth = doc.getTextWidth(lines[i].replace(/ /g, ''));
          const totalSpaceW = maxW - lineWidth;
          const spaceW = totalSpaceW / (words.length - 1);
          let xPos = ML + 8;
          words.forEach((word, wi) => {
            doc.text(word, xPos, Y);
            xPos += doc.getTextWidth(word) + spaceW;
          });
        } else {
          doc.text(lines[i], ML + 8, Y);
        }
      } else {
        doc.text(lines[i], ML + 8, Y);
      }
      Y += lineH;
    }
    Y += 3;
  }

  seccion('1.-ANTECEDENTES');
  cuerpo('Con base en el lineamiento establecido por la Subsecretaría de Educación Especializada e Inclusiva, que detalla los procedimientos y requisitos para la validación y selección del personal docente en los servicios educativos especializados e inclusivos, se requiere la elaboración de un informe técnico que indique si los candidatos propuestos para reemplazos o contrataciones especiales se encuentran registrados en el sistema REDEVI.');

  seccion('2.- OBJETIVOS');
  cuerpo('El objetivo del presente informe técnico es identificar y verificar si los funcionarios propuestos para su incorporación en los servicios educativos especializados e inclusivos se encuentran registrados en el sistema REDEVI, conforme a lo establecido en el lineamiento de validación y selección de perfiles.');

  seccion('3.- DESARROLLO O ANÁLISIS');
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(0);
  doc.text('3.1. Validación de los perfiles en el aplicativo REDEVI.', ML + 8, Y); Y += 5;
  
  cuerpo('Se procede a realizar la validación en el aplicativo REDEVI, identificándose lo siguiente:');

  // ── TABLA PERSONAS ──────────────────────────────────
  // ── Tabla personas: anchos dinámicos según contenido ──
  const FS_PER = 10;
  const pHdr = 8;
  doc.setFontSize(FS_PER);

  // Medir encabezados
  doc.setFont('helvetica','bold');
  let wCed = doc.getTextWidth('Cédula') + PAD*2 + 6;
  let wApe = doc.getTextWidth('Apellidos') + PAD*2 + 6;
  let wNom = doc.getTextWidth('Nombres') + PAD*2 + 6;
  let wVal = doc.getTextWidth('Validación REDEVI') + PAD*2 + 6;

  // Ampliar según datos reales
  doc.setFont('helvetica','normal');
  personas.forEach(p => {
    wCed = Math.max(wCed, doc.getTextWidth(p.cedula)    + PAD*2 + 6);
    wApe = Math.max(wApe, doc.getTextWidth(p.apellidos) + PAD*2 + 6);
    wNom = Math.max(wNom, doc.getTextWidth(p.nombres)   + PAD*2 + 6);
  });
  doc.setFont('helvetica','bold');
  wVal = Math.max(wVal, doc.getTextWidth('NO REGISTRA') + PAD*2 + 6);

  const pcw = [wCed, wApe, wNom, wVal];

  // Dibujar encabezado
  const pHdrs = ['Cédula','Apellidos','Nombres','Validación REDEVI'];
  let px = ML;
  pHdrs.forEach((h, i) => {
    doc.setFillColor(255,255,255);
    doc.rect(px, Y, pcw[i], pHdr, 'F');
    doc.setDrawColor(0); doc.setLineWidth(0.3);
    doc.rect(px, Y, pcw[i], pHdr, 'S');
    doc.setTextColor(0); doc.setFont('helvetica','bold'); doc.setFontSize(FS_PER);
    doc.text(h, px + PAD, Y + pHdr * 0.68);
    px += pcw[i];
  });
  Y += pHdr;

  // Dibujar filas
  personas.forEach(p => {
    const rH = pHdr;  // misma altura que encabezado

    if (Y + rH > PH - MB) {
      doc.addPage();
      doc.addImage('data:image/png;base64,' + MEMBRETE_B64, 'PNG', 0, 0, PW, PH);
      Y = MT;
    }

    let px2 = ML;
    [[p.cedula,pcw[0]],[p.apellidos,pcw[1]],[p.nombres,pcw[2]],['NO REGISTRA',pcw[3]]].forEach(([txt,w], ci) => {
      doc.setFillColor(255,255,255);
      doc.rect(px2, Y, w, rH, 'F');
      doc.setDrawColor(0); doc.setLineWidth(0.3);
      doc.rect(px2, Y, w, rH, 'S');
      const isBold = ci === 3;
      doc.setFont('helvetica', isBold ? 'bold' : 'normal');
      doc.setFontSize(FS_PER); doc.setTextColor(0);
      doc.text(txt, px2 + PAD, Y + rH * 0.68);
      px2 += w;
    });
    Y += rH;
  });

  Y += 5;

  // Salto de página si queda poco espacio para conclusiones + firmas
  const spaceNeeded = 70;
  if (Y + spaceNeeded > PH - MB) {
    doc.addPage();
    doc.addImage('data:image/png;base64,' + MEMBRETE_B64, 'PNG', 0, 0, PW, PH);
    Y = MT;
  }

  seccion('4.- CONCLUSIONES');
  cuerpo('Una vez validada la información en el aplicativo REDEVI, se concluye que los perfiles evaluados no presentan registros de denuncias de violencia.');

  seccion('5.- RECOMENDACIONES');
  cuerpo('Se recomienda continuar con los procesos de validación y selección de perfiles profesionales, conforme corresponda a cada tipo de servicio educativo y modalidad, siguiendo estrictamente los lineamientos establecidos.');

  Y += 4;

  // ── TABLA DE FIRMAS ──────────────────────────────────
  const fcw = [55, 74, 45];
  const fHdr = 6.5;
  const fRowH = 17; // altura para firmar

  // Verificar si cabe la tabla completa; si no, nueva página
  const totalFirmas = fHdr*2 + fRowH + fHdr + fHdr + fRowH;
  if (Y + totalFirmas > PH - MB) {
    doc.addPage();
    doc.addImage('data:image/png;base64,' + MEMBRETE_B64, 'PNG', 0, 0, PW, PH);
    Y = MT;
  }

  function drawFirmaSection(titulo, nombre, cargo, y) {
    // Encabezado
    doc.setFillColor(...GRIS_OSC);
    doc.rect(ML, y, CW, fHdr, 'F');
    doc.setDrawColor(150); doc.setLineWidth(0.2);
    doc.rect(ML, y, CW, fHdr, 'S');
    doc.setTextColor(0); doc.setFont('helvetica','bold'); doc.setFontSize(9);
    doc.text(titulo, ML + CW/2, y + 4.5, { align: 'center' });

    // Sub-encabezado Nombre / Cargo / Firma
    let yh = y + fHdr;
    let fx = ML;
    ['Nombre','Cargo','Firma'].forEach((h, i) => {
      doc.setFillColor(...GRIS_CL);
      doc.rect(fx, yh, fcw[i], fHdr, 'F');
      doc.setDrawColor(150); doc.setLineWidth(0.2);
      doc.rect(fx, yh, fcw[i], fHdr, 'S');
      doc.setTextColor(...AZUL_TXT); doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.text(h, fx + PAD, yh + 4.5);
      fx += fcw[i];
    });

    // Fila de datos
    let yr = yh + fHdr;
    fx = ML;
    [[nombre,fcw[0]],[cargo,fcw[1]],['',fcw[2]]].forEach(([txt,w]) => {
      doc.setFillColor(255,255,255);
      doc.rect(fx, yr, w, fRowH, 'F');
      doc.setDrawColor(150); doc.setLineWidth(0.2);
      doc.rect(fx, yr, w, fRowH, 'S');
      if (txt) {
        doc.setTextColor(0); doc.setFont('helvetica','bold'); doc.setFontSize(9);
        const lines = doc.splitTextToSize(txt, w - PAD*2);
        lines.forEach((l,i) => doc.text(l, fx+PAD, yr + 4 + i*4));
      }
      fx += w;
    });

    return yr + fRowH;
  }

  let yAfter = drawFirmaSection('DESARROLLO DEL DOCUMENTO', 'Jefferson Steeven Solis Burgos', 'Analista Zonal DECE', Y);
  Y = yAfter + 4;
  drawFirmaSection('REVISIÓN Y APROBACIÓN DEL DOCUMENTO', 'María de Lourdes Bermúdez Morán', 'Directora Zonal de Educación Especializada e Inclusiva', Y);

  // Guardar
  const fname = `Informe_REDEVI_${numero.replace(/\//g,'-').replace(/ /g,'_')}.pdf`;
  doc.save(fname);

  document.getElementById('status').textContent = `✓ ${fname}`;
  document.getElementById('status').className = 'status ok';
}
</script>
</body>
</html>
